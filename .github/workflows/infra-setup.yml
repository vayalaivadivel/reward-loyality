name: Infra-Setup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [dev, staging, prod]

      action:
        description: "Choose action"
        required: true
        type: choice
        options: [apply, destroy]

      confirm_destroy:
        description: "Confirm destroy?"
        required: true
        type: choice
        options:
          - "no"
          - "yes"

permissions:
  id-token: write
  contents: read

# 🚀 Prevent parallel runs (fix DynamoDB lock issues)
concurrency:
  group: terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: infra

    env:
      TF_IN_AUTOMATION: true

      # 🔐 Secure variables (DO NOT keep in tfvars)
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::298493767003:role/reward-loyality-githubaction-role
        aws-region: ap-south-1

    # 🔥 IMPORTANT: disable wrapper (fix exit code issue)
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    # ---------------- INIT ----------------
    - name: Terraform Init
      run: |
        terraform init -upgrade \
          -backend-config="key=reward_loyality/${{ github.event.inputs.environment }}/terraform.tfstate"

    # ---------------- VALIDATE ----------------
    - name: Terraform Validate
      run: terraform validate

    # ---------------- FORMAT ----------------
    - name: Terraform Format Check
      run: terraform fmt -check

    # ---------------- PLAN (FIXED) ----------------
    - name: Terraform Plan
      id: plan
      shell: bash
      run: |
        set +e

        terraform plan \
          -var-file=environments/${{ github.event.inputs.environment }}.tfvars \
          -out=tfplan

        EXIT_CODE=$?

        echo "Terraform exit code: $EXIT_CODE"

        # Fail ONLY on real error
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "❌ Terraform plan failed"
          exit 1
        fi

        echo "✅ Terraform plan succeeded"

    # ---------------- SHOW PLAN ----------------
    - name: Show Plan Output
      run: terraform show -no-color tfplan

    # ---------------- UPLOAD PLAN ----------------
    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-${{ github.event.inputs.environment }}
        path: infra/tfplan

    # ---------------- DESTROY SAFETY ----------------
    - name: Validate Destroy Confirmation
      if: github.event.inputs.action == 'destroy'
      run: |
        if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
          echo "❌ Destroy requires confirmation = yes"
          exit 1
        fi

    # 🔥 OPTIONAL (recommended): block prod destroy
    - name: Block Prod Destroy
      if: github.event.inputs.action == 'destroy' && github.event.inputs.environment == 'prod'
      run: |
        echo "❌ Destroy not allowed for PROD"
        exit 1

    # ---------------- APPLY ----------------
    - name: Terraform Apply
      if: github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve tfplan

    # ---------------- DESTROY ----------------
    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        terraform destroy -auto-approve \
          -var-file=environments/${{ github.event.inputs.environment }}.tfvars