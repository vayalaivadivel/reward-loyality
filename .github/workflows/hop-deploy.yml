name: Hop-Deploy

on:

  push:

    branches:
      - main

    paths:
      - 'hop-orchestration/**'

  workflow_dispatch:

    inputs:

      environment:
        description: "Select environment"
        required: true
        default: dev
        type: choice

        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:

  hop-deploy:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    env:

      AWS_REGION: ap-south-1

      AWS_ACCOUNT_ID: 298493767003

      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

      ECR_REPOSITORY: glorytechsystems-platform-images

      IMAGE_TAG: reward-loyalty-${{ github.event.inputs.environment || 'dev' }}

      IMAGE_URI: 298493767003.dkr.ecr.ap-south-1.amazonaws.com/glorytechsystems-platform-images:reward-loyalty-${{ github.event.inputs.environment || 'dev' }}

      ECS_CLUSTER_NAME: reward-loyalty-ecs-${{ github.event.inputs.environment || 'dev' }}

      ECS_SERVICE_NAME: reward-loyalty-hop-service-${{ github.event.inputs.environment || 'dev' }}

    steps:

      #######################################################
      # CHECKOUT
      #######################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #######################################################
      # CONFIGURE AWS
      #######################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: arn:aws:iam::298493767003:role/reward-loyality-githubaction-role

          aws-region: ap-south-1

      #######################################################
      # LOGIN TO ECR
      #######################################################

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      #######################################################
      # BUILD DOCKER IMAGE
      #######################################################

      - name: Build Docker Image

        run: |

          docker build \
            --no-cache \
            -t reward-loyalty-hop \
            -f hop-orchestration/docker/Dockerfile \
            ./hop-orchestration

      #######################################################
      # TAG DOCKER IMAGE
      #######################################################

      - name: Tag Docker Image

        run: |

          docker tag reward-loyalty-hop:latest $IMAGE_URI

      #######################################################
      # PUSH IMAGE TO ECR
      #######################################################

      - name: Push Docker Image

        run: |

          docker push $IMAGE_URI

      #######################################################
      # FORCE ECS DEPLOYMENT
      #######################################################

      - name: Restart ECS Service

        run: |

          aws ecs update-service \
            --cluster $ECS_CLUSTER_NAME \
            --service $ECS_SERVICE_NAME \
            --force-new-deployment \
            --region $AWS_REGION

      #######################################################
      # DISPLAY SUCCESS
      #######################################################

      - name: Deployment Successful

        run: |

          echo "======================================="

          echo "Apache Hop Deployment Successful"

          echo "======================================="

          echo "Environment: $ENVIRONMENT"

          echo ""

          echo "Image URI:"

          echo "$IMAGE_URI"

          echo ""

          echo "ECS Cluster:"

          echo "$ECS_CLUSTER_NAME"

          echo ""

          echo "ECS Service:"

          echo "$ECS_SERVICE_NAME"

          echo "======================================="